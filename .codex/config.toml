# Project-scoped Codex configuration for SG Couture admin.
# User-level model, plugin, and MCP defaults still come from ~/.codex/config.toml.

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[features]
hooks = true

[[hooks.PreToolUse]]
matcher = "^(Bash|apply_patch|Edit|Write)$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = 'python3 "$(git rev-parse --show-toplevel)/.codex/hooks/pre_tool_use_policy.py"'
timeout = 30
statusMessage = "Checking repository file policy"
